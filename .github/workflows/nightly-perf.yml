name: nightly-perf

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  browse-budgets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: perevoditarr
          POSTGRES_PASSWORD: perevoditarr
          POSTGRES_DB: perevoditarr_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perevoditarr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --frozen
      # NFR-4 budgets at NFR-2 scale (100k episodes) on the recommended engine
      - run: uv run pytest tests/perf -m perf -q
        env:
          PEREVODITARR_PERF_DATABASE_URL: postgresql+asyncpg://perevoditarr:perevoditarr@localhost:5432/perevoditarr_perf
