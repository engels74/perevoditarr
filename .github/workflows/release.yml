name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      # push the versioned container image to GHCR
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # semver tag (from v* ref) plus a moving latest, per PRD release engineering (P4-T3)
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: image
    # only cut a GitHub Release for real tag pushes, not manual dispatch dry-runs
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # create the GitHub Release and read history for the changelog
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # conventional-commits changelog for the notes body (git-cliff)
      - id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          # no cliff.toml in-repo: git-cliff falls back to its embedded default config
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.release.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.release.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
