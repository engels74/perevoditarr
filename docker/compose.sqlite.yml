# Perevoditarr + SQLite (lightweight option for small libraries, PRD NFR-2).
# Run from the repository root:  docker compose -f docker/compose.sqlite.yml up
services:
  perevoditarr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: perevoditarr
    ports:
      - "8000:8000"
    environment:
      # Consumed by the backend from Phase 1 (P1-T1) onward; documents the shape now.
      PEREVODITARR_DATABASE_URL: sqlite+aiosqlite:////config/perevoditarr.db
    volumes:
      - ./config:/config
    restart: unless-stopped
